# Render blueprint — free tier.
#
# Three services:
#   1. the web app
#   2. a cron job that closes expired ordering deadlines every 5 minutes
#   3. a keep-alive ping, because Render's free web service sleeps after ~15
#      minutes idle and takes ~50s to wake — a cold start right before the
#      10:30 deadline is the failure this avoids
#
# Secrets are marked `sync: false`, so Render prompts for them on first deploy
# rather than storing them in this file. See DEPLOY.md.

services:
  - type: web
    name: tiffine
    runtime: node
    plan: free
    region: singapore # closest to India — lower latency for the group
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Render assigns the port; Next reads it from the environment.
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: NEXT_PUBLIC_UPI_PAYEE_VPA
        sync: false
      - key: NEXT_PUBLIC_UPI_PAYEE_NAME
        sync: false

  # Closes any day whose deadline has passed, notifies admins, prunes expired
  # sessions. Idempotent — only `published` days transition — so an overlapping
  # or repeated run cannot double-close or double-notify.
  - type: cron
    name: tiffine-sweep-deadlines
    runtime: node
    plan: free
    region: singapore
    schedule: "*/5 * * * *"
    buildCommand: npm ci
    startCommand: >
      curl -fsS --max-time 30
      -H "Authorization: Bearer $CRON_SECRET"
      "$APP_URL/api/cron/sweep-deadlines"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: APP_URL
        sync: false

  # Keeps the web service awake during Indian working hours only.
  #
  # 03:30–13:30 UTC is 09:00–19:00 IST. Restricting the window matters: pinging
  # around the clock wastes free-tier build minutes and keeps the instance up
  # when nobody is ordering.
  - type: cron
    name: tiffine-keep-alive
    runtime: node
    plan: free
    region: singapore
    schedule: "*/10 3-13 * * *"
    buildCommand: npm ci
    startCommand: curl -fsS --max-time 20 "$APP_URL/api/health"
    envVars:
      - key: APP_URL
        sync: false
